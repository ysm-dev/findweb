name: Publish

on:
  push:
    branches:
      - main

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
      release_type: ${{ steps.meta.outputs.release_type }}
      publish_version: ${{ steps.meta.outputs.publish_version }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify release
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          current_package=$(node -p "require('./package.json').name")
          current_version=$(node -p "require('./package.json').version")
          before_sha="${{ github.event.before }}"
          short_sha="${GITHUB_SHA::7}"
          previous_version=""

          if [ "$before_sha" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
            previous_version=$(git show "${before_sha}:package.json" 2>/dev/null | node -e "const fs = require('fs'); const input = fs.readFileSync(0, 'utf8').trim(); if (input) process.stdout.write(JSON.parse(input).version);")
          fi

          if [ -n "$previous_version" ] && [ "$current_version" != "$previous_version" ]; then
            release_type="stable"
            publish_version="$current_version"
            npm_tag="latest"
          else
            release_type="canary"
            publish_version="${current_version}-canary.${short_sha}"
            npm_tag="canary"
          fi

          {
            echo "package_name=$current_package"
            echo "release_type=$release_type"
            echo "publish_version=$publish_version"
            echo "npm_tag=$npm_tag"
          } >> "$GITHUB_OUTPUT"

  verify:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  publish:
    runs-on: ubuntu-latest
    needs:
      - classify
      - verify
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set canary version
        if: needs.classify.outputs.release_type == 'canary'
        run: npm pkg set version="${{ needs.classify.outputs.publish_version }}"

      - name: Check whether version is already published
        id: published
        shell: bash
        env:
          PACKAGE_NAME: ${{ needs.classify.outputs.package_name }}
          PUBLISH_VERSION: ${{ needs.classify.outputs.publish_version }}
        run: |
          set -euo pipefail

          if npm view "${PACKAGE_NAME}@${PUBLISH_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.published.outputs.published != 'true'
        run: npm publish --access public --tag "${{ needs.classify.outputs.npm_tag }}" --provenance
